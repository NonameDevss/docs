<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ad8ff"/>
      <stop offset="1" stop-color="#1f6fae"/>
    </linearGradient>

    <linearGradient id="shadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3e5f" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#0d3e5f" stop-opacity="0.65"/>
    </linearGradient>

    <linearGradient id="hillDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d7b3b"/>
      <stop offset="1" stop-color="#0a5d2c"/>
    </linearGradient>

    <linearGradient id="hillLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9be35b"/>
      <stop offset="1" stop-color="#56b83a"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>

    <clipPath id="iconClip">
      <rect x="80" y="70" width="220" height="220" rx="26"/>
    </clipPath>
  </defs>

  <!-- ICON -->
  <g filter="url(#softShadow)">
    <rect x="80" y="70" width="220" height="220" rx="26" fill="url(#sky)"/>
    <rect x="80" y="70" width="220" height="220" rx="26" fill="url(#shadow)" opacity="0.35"/>

    <!-- scene inside icon -->
    <g clip-path="url(#iconClip)">
      <!-- hills -->
      <path d="M60 250 C 120 200, 210 190, 340 260 L 340 360 L 60 360 Z" fill="url(#hillLight)"/>
      <path d="M50 285 C 120 245, 190 230, 310 295 L 310 360 L 50 360 Z" fill="url(#hillDark)"/>

      <!-- peeled white sheet -->
      <path d="M190 86
               C 250 118, 255 176, 250 230
               C 246 270, 205 298, 155 315
               C 220 290, 230 258, 235 230
               C 246 160, 234 120, 190 86 Z"
            fill="#ffffff"/>

      <!-- curl highlight edge -->
      <path d="M248 78
               C 284 120, 288 176, 282 232
               C 277 280, 236 316, 184 334
               C 258 308, 265 270, 270 232
               C 278 168, 270 118, 248 78 Z"
            fill="#ffffff" opacity="0.22"/>

      <!-- sun (white dot) -->
      <circle cx="252" cy="104" r="18" fill="#ffffff"/>
    </g>

    <!-- icon border -->
    <rect x="80" y="70" width="220" height="220" rx="26" fill="none" stroke="#0b4d74" stroke-opacity="0.25"/>
  </g>

  <!-- TEXT -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="800">
    <text x="360" y="170" font-size="96" fill="#1a6fb2" letter-spacing="-1">Background</text>
    <text x="360" y="260" font-size="96" fill="#66c11a" letter-spacing="-1">Remover</text>
  </g>
</svg>